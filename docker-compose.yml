services:
  agent-lab:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_BACKEND=${LLM_BACKEND:-mock}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      - VECTOR_BACKEND=${VECTOR_BACKEND:-memory}
      - CHAT_HISTORY_BACKEND=${CHAT_HISTORY_BACKEND:-memory}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql+psycopg2://agentlab:agentlab@postgres:5432/agentlab}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    extra_hosts:
      - "host.docker.internal:host-gateway"


  ollama:
    image: ollama/ollama:latest
    profiles: ["with-ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama


  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentlab
      POSTGRES_PASSWORD: agentlab
      POSTGRES_DB: agentlab
    ports:
      - "5432:5432"
    volumes:
      - agentlab_postgres_data:/var/lib/postgresql/data

      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentlab"]
      interval: 5s
      timeout: 3s
      retries: 10


  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - agentlab_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ollama_models:
  agentlab_postgres_data:
  agentlab_redis_data:
